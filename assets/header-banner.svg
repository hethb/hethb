<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="45%" stop-color="#1e3c72"/>
      <stop offset="100%" stop-color="#2a5298"/>
    </linearGradient>

    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5fa8ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5fa8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haze" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3b6fd1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b6fd1" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <style>
      @keyframes driftA { 0%,100% { transform: translate(0px,0px); } 50% { transform: translate(70px,-30px); } }
      @keyframes driftB { 0%,100% { transform: translate(0px,0px); } 50% { transform: translate(-60px,35px); } }
      @keyframes driftC { 0%,100% { transform: translate(0px,0px); } 50% { transform: translate(45px,40px); } }
      @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: 0.15; } 50% { opacity: 0.85; } }
      @keyframes scrollWave1 { from { transform: translateX(0); } to { transform: translateX(-1200px); } }
      @keyframes scrollWave2 { from { transform: translateX(0); } to { transform: translateX(-1200px); } }

      .orb-a { animation: driftA 13s ease-in-out infinite; }
      .orb-b { animation: driftB 17s ease-in-out infinite; }
      .orb-c { animation: driftC 21s ease-in-out infinite; }
      .haze  { animation: spinSlow 70s linear infinite; transform-origin: 600px 130px; }

      .dot0 { animation: pulse 2.6s ease-in-out infinite; }
      .dot1 { animation: pulse 2.6s ease-in-out infinite; animation-delay: .3s; }
      .dot2 { animation: pulse 2.6s ease-in-out infinite; animation-delay: .6s; }
      .dot3 { animation: pulse 2.6s ease-in-out infinite; animation-delay: .9s; }
      .dot4 { animation: pulse 2.6s ease-in-out infinite; animation-delay: 1.2s; }
      .dot5 { animation: pulse 2.6s ease-in-out infinite; animation-delay: 1.5s; }
      .dot6 { animation: pulse 2.6s ease-in-out infinite; animation-delay: 1.8s; }
      .dot7 { animation: pulse 2.6s ease-in-out infinite; animation-delay: 2.1s; }

      .wave1 { animation: scrollWave1 9s linear infinite; }
      .wave2 { animation: scrollWave2 15s linear infinite; }
    </style>
  </defs>

  <!-- base background -->
  <rect width="1200" height="260" fill="url(#bg)"/>
  <circle class="haze" cx="600" cy="130" r="260" fill="url(#haze)"/>

  <!-- circuit / constellation network -->
  <g stroke="#7fb2ff" stroke-opacity="0.22" stroke-width="1">
    <line x1="80" y1="50" x2="220" y2="90"/>
    <line x1="220" y1="90" x2="180" y2="160"/>
    <line x1="220" y1="90" x2="360" y2="60"/>
    <line x1="360" y1="60" x2="470" y2="120"/>
    <line x1="180" y1="160" x2="320" y2="190"/>
    <line x1="320" y1="190" x2="470" y2="120"/>
    <line x1="730" y1="55" x2="860" y2="95"/>
    <line x1="860" y1="95" x2="980" y2="60"/>
    <line x1="860" y1="95" x2="820" y2="175"/>
    <line x1="820" y1="175" x2="970" y2="195"/>
    <line x1="970" y1="195" x2="1100" y2="150"/>
    <line x1="980" y1="60" x2="1100" y2="100"/>
  </g>

  <g fill="#a9cdfd">
    <circle class="dot0" cx="80" cy="50" r="3"/>
    <circle class="dot1" cx="220" cy="90" r="3.4"/>
    <circle class="dot2" cx="180" cy="160" r="2.6"/>
    <circle class="dot3" cx="360" cy="60" r="3"/>
    <circle class="dot4" cx="470" cy="120" r="3.2"/>
    <circle class="dot5" cx="320" cy="190" r="2.6"/>
    <circle class="dot6" cx="730" cy="55" r="3"/>
    <circle class="dot7" cx="860" cy="95" r="3.4"/>
    <circle class="dot1" cx="980" cy="60" r="2.8"/>
    <circle class="dot3" cx="820" cy="175" r="3"/>
    <circle class="dot5" cx="970" cy="195" r="2.6"/>
    <circle class="dot7" cx="1100" cy="150" r="3"/>
    <circle class="dot2" cx="1100" cy="100" r="2.4"/>
  </g>

  <!-- traveling data-packet dots along the network -->
  <circle r="3.4" fill="#ffffff">
    <animateMotion dur="4.5s" repeatCount="indefinite"
      path="M80,50 L220,90 L360,60 L470,120" />
  </circle>
  <circle r="3.4" fill="#ffffff">
    <animateMotion dur="5.5s" repeatCount="indefinite"
      path="M730,55 L860,95 L980,60 L1100,100" />
  </circle>
  <circle r="3" fill="#dfe9ff">
    <animateMotion dur="6.2s" repeatCount="indefinite"
      path="M180,160 L320,190 L470,120" />
  </circle>

  <!-- floating glow orbs -->
  <circle class="orb-a" cx="190" cy="90" r="120" fill="url(#orbBlue)" filter="url(#soft)"/>
  <circle class="orb-b" cx="980" cy="70" r="140" fill="url(#orbPurple)" filter="url(#soft)"/>
  <circle class="orb-c" cx="650" cy="190" r="110" fill="url(#orbCyan)" filter="url(#soft)"/>

  <!-- scrolling parallax waves -->
  <g class="wave2" fill="#1e3c72" opacity="0.55">
    <path d="M0,205 Q100,190 200,205 Q300,220 400,205 Q500,190 600,205 Q700,220 800,205 Q900,190 1000,205 Q1100,220 1200,205 L1200,260 L0,260 Z"/>
    <path d="M1200,205 Q1300,190 1400,205 Q1500,220 1600,205 Q1700,190 1800,205 Q1900,220 2000,205 Q2100,190 2200,205 Q2300,220 2400,205 L2400,260 L1200,260 Z"/>
  </g>
  <g class="wave1" fill="#2a5298" opacity="0.7">
    <path d="M0,220 Q75,205 150,220 Q225,235 300,220 Q375,205 450,220 Q525,235 600,220 Q675,205 750,220 Q825,235 900,220 Q975,205 1050,220 Q1125,235 1200,220 L1200,260 L0,260 Z"/>
    <path d="M1200,220 Q1275,205 1350,220 Q1425,235 1500,220 Q1575,205 1650,220 Q1725,235 1800,220 Q1875,205 1950,220 Q2025,235 2100,220 Q2175,205 2250,220 Q2325,235 2400,220 L2400,260 L1200,260 Z"/>
  </g>

  <!-- static title (no animation) -->
  <text x="600" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="58" font-weight="700" fill="#ffffff">Heth Bhatt</text>
  <text x="600" y="156" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="17" fill="#bcd0f7">CS + Information Systems @ CMU — ML Research • Founder</text>
</svg>
